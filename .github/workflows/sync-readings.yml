name: Sync Readwise readings

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sync-readings
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      READWISE_ACCESS_TOKEN: ${{ secrets.READWISE_ACCESS_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync readings
        run: npm run sync:readings

      - name: Check for reading changes
        id: changes
        run: |
          if git diff --quiet -- src/data/readings.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Commit synced readings
        if: steps.changes.outputs.changed == 'true'
        run: |
          node <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { readFileSync, writeFileSync } from 'node:fs';

          const repo = process.env.GITHUB_REPOSITORY;
          const branch = process.env.GITHUB_REF_NAME;
          const filePath = 'src/data/readings.json';
          const sha = execFileSync(
            'gh',
            ['api', `repos/${repo}/contents/${filePath}`, '--jq', '.sha'],
            { encoding: 'utf8' },
          ).trim();

          writeFileSync(
            '/tmp/update-readings.json',
            JSON.stringify({
              message: 'Sync Readwise readings',
              content: readFileSync(filePath, 'base64'),
              sha,
              branch,
            }),
          );
          NODE

          gh api \
            --method PUT \
            "repos/${GITHUB_REPOSITORY}/contents/src/data/readings.json" \
            --input /tmp/update-readings.json \
            >/tmp/update-readings-response.json

      - name: Deploy Worker and static assets
        if: steps.changes.outputs.changed == 'true'
        run: npx wrangler deploy
