name: Sync Readwise readings

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-readings
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      READWISE_ACCESS_TOKEN: ${{ secrets.READWISE_ACCESS_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync readings
        run: npm run sync:readings

      - name: Check for reading changes
        id: changes
        run: |
          if git diff --quiet -- src/data/readings.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Deploy Worker and static assets
        if: steps.changes.outputs.changed == 'true'
        run: npx wrangler deploy

      - name: Commit synced readings
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/readings.json
          git commit -m "Sync Readwise readings"
          git push
